name: Deploy to Contabo VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # If the application directory does not exist, create it and clone the repository
            if [ ! -d "/app/workflow-kpi-analytics" ]; then
              mkdir -p /app
              cd /app
              git clone https://github.com/cesarfois/kpi.git workflow-kpi-analytics
            fi
            
            # Go to the application directory
            cd /app/workflow-kpi-analytics
            
            # Pull the latest code
            git pull origin master
            
            # Rebuild and restart the containers
            docker compose down --remove-orphans
            docker compose up -d --build
